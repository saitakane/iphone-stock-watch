name: iPhone在庫チェック

on:
  schedule:
    # 「起動役」兼「安全網」。連鎖が切れてもここが拾う
    # JST 7:00〜21:59（UTC 22:00〜12:59）
    - cron: '*/5 22-23,0-12 * * *'
  workflow_dispatch:
    inputs:
      chained:
        description: '自動連鎖用（手動実行するときは触らないでください）'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: stock-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: 在庫チェック
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          LOOPS: '55'
          INTERVAL: '60'
          # 手動実行のときだけテスト通知。連鎖起動では鳴らさない
          TEST_NOTIFY: ${{ (github.event_name == 'workflow_dispatch' && !inputs.chained) && '1' || '0' }}
        run: bash check.sh

      - name: 状態を保存
        if: always()
        run: |
          if [ -f state.txt ] && [ -n "$(git status --porcelain state.txt)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.txt
            git commit -m "state: $(cat state.txt)"
            git pull --rebase --autostash
            git push
          else
            echo "状態に変化なし。コミットしません。"
          fi

      # ===== ここが今回の主役：自分で自分の次を予約する =====
      - name: 次の実行を予約（自己連鎖）
        if: always()
        env:
          GH_TOKEN: ${{ secrets.CHAIN_TOKEN }}
        run: |
          H=$(TZ='Asia/Tokyo' date +%H)
          H=$((10#$H))   # 08 や 09 を8進数と誤解させないための書き方
          if [ "$H" -ge 7 ] && [ "$H" -le 21 ]; then
            echo "現在 ${H}時(JST) → 次の実行を予約します"
            gh workflow run check.yml --ref main -f chained=true
            echo "予約しました"
          else
            echo "現在 ${H}時(JST) → 夜間のため連鎖を止めます（翌朝7時にcronが再開）"
          fi
